name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check required files
        run: |
          test -f index.html
          test -f styles.css
          test -f script.js

      - name: JavaScript syntax check
        run: node --check script.js

      - name: HTML lint
        run: npx --yes htmlhint index.html
